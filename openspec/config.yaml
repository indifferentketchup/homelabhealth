schema: spec-driven

# Project context
# Shown to AI when creating artifacts. Add tech stack, conventions, domain knowledge.
context: |
  Tech stack: FastAPI (Python 3.12, asyncpg), React 18 (Vite, Tailwind, shadcn/ui, Zustand, TanStack Query),
  PostgreSQL 16 + pgvector (1024-dim vectors), llama.cpp chat sidecar, Docker Compose.
  Domain: Self-hosted RAG chat app for personal health records. Single-user homelab tool, MIT license.
  Bundle-first AI: bundled llama.cpp for chat/embed/rerank, MedGemma vision, SearXNG search.
  External tier: bring-your-own OpenAI-compatible endpoints.
  Auth: built-in username/password (argon2), session cookies.
  Security: column encryption (AES-256-GCM, HKDF DEKs), de-identification, hash-chained audit log.
  Conventions: asyncpg + JSONB (pass dicts as json.dumps), pgvector (pass as str + ::vector cast),
  singleton tables use UNIQUE INDEX ON ((1)), VITE_* env vars baked at build time.
  No test runner — verify via curl scripts in backend/scripts/verify_*.sh and verify_*.py.
  CHANGELOG.md per tag, [Unreleased] at top.
  Git identity: indifferentketchup <sam@indifferentketchup.com>.

rules:
  proposal:
    - Explain "Why" before "What"
    - Include scope and non-goals for every batch
    - Reference source repos for each lift
  tasks:
    - Each task is one atomic action (1-3 tool calls)
    - Every task has acceptance criteria with verification commands
    - QA scenarios use curl against running stack
  design:
    - Capture wave ordering and dependency rationale
    - Explicit guardrails (Must Have, Must NOT Have)
    - Document backward compat strategy
