# hlh_chat router — model presets for llama-server --models-preset
# Each section name is the model alias used in API request body { "model": "<alias>" }.
#
# Chat sections point at /models/active-<alias>.gguf symlinks; the API's
# bundled_providers.link_active_chat re-aims the symlink at the right GGUF
# whenever the operator picks a tier or the puller finishes a chat download.
# This lets a single static models.ini serve every tier.
#
# n-gpu-layers = auto delegates the offload decision to llama.cpp: the CPU
# build no-ops it; the CUDA build offloads as many layers as fit in VRAM.

[*]
cache-type-k = q4_0
cache-reuse = 256
slot-save-path = /tmp/llama-slots
cache-idle-slots = 1
spec-type = ngram-mod
ctx-checkpoints = 32
metrics = 1
sleep-idle-seconds = 600

# Chat: MedGemma (cpu-std / gpu-* tiers). Symlink target varies by tier:
#   cpu-std / gpu-4gb  → medgemma-1.5-4b-it-Q4_K_M.gguf
#   gpu-8gb / gpu-16gb → medgemma-1.5-4b-it-Q8_0.gguf
#   gpu-24gb+          → medgemma-27b-it-Q4_K_M.gguf
# MedGemma is multimodal: with its mmproj loaded, this ONE instance serves chat
# AND image-reading (services/vision.py requests model="medgemma"), so there's no
# separate vision model and no second copy in VRAM. The mmproj symlink is aimed
# at the tier's projector by bundled_providers.link_active_mmproj — 4b mmproj on
# the 4b chat tiers, 27b on the 27b tiers — matched to the chat model above.
# (Requires the matching vision mmproj to be pulled; the doctor flags it if not.)
[medgemma]
model = /models/active-medgemma.gguf
mmproj = /models/vision/active-mmproj.gguf
ctx-size = 8192
n-gpu-layers = auto
jinja = 1
cache-type-v = q4_0
flash-attn = on
spec-ngram-mod-n-max = 96

# Tasks: Gemma 3 270M-IT (title generation, lightweight)
[gemma-tasks]
model = /models/gemma-3-270m-it-UD-Q8_K_XL.gguf
ctx-size = 512
n-gpu-layers = auto
jinja = 1

# Embed and rerank moved to the boofinity child of hlh_swap (folder B,
# boofinity-inference-frontdoor): the dense-embedding and reranker models are now
# served by boofinity at hlh_swap:9620, not by this llama-server router. Their
# sections were removed here.

# Chat: Qwen (cpu-min tier only — smaller model for <16GB RAM hosts).
# Symlink target: Qwen3.5-0.8B-Q8_0.gguf
[qwen-chat]
model = /models/active-qwen.gguf
ctx-size = 4096
n-gpu-layers = auto
jinja = 1
cache-type-v = q4_0
flash-attn = on
spec-type = draft-mtp
