# hlh_chat router — model presets for llama-server --models-preset
# Each section name is the model alias used in API request body { "model": "<alias>" }.

[*]
sleep-idle-seconds = 300

# Chat: MedGemma 1.5 4B Q4_K_M (cpu-std tier default)
[medgemma]
model = /models/chat/cpu-std/medgemma-1.5-4b-it-Q4_K_M.gguf
ctx-size = 8192
n-gpu-layers = 0
jinja = 1

# Tasks: Gemma 3 270M-IT (title generation, lightweight)
[gemma-tasks]
model = /models/gemma-3-270m-it-UD-Q8_K_XL.gguf
ctx-size = 512
n-gpu-layers = 0
jinja = 1

# Embed: bge-m3 Q8_0 (1024-dim dense retrieval)
[bge-m3]
model = /models/bge-m3-Q8_0.gguf
ctx-size = 8192
n-gpu-layers = 0
embedding = 1
pooling = mean

# Rerank: bge-reranker-v2-m3 Q8_0
[bge-reranker]
model = /models/bge-reranker-v2-m3-Q8_0.gguf
ctx-size = 4096
n-gpu-layers = 0
embedding = 1
pooling = rank

# Chat: Qwen3-1.7B Q8_0 (cpu-min tier — smaller model for <16GB RAM hosts)
[qwen-chat]
model = /models/chat/cpu-min/Qwen3-1.7B-Q8_0.gguf
ctx-size = 4096
n-gpu-layers = 0
jinja = 1
