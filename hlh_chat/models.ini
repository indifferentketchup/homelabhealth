# hlh_chat router — model presets for llama-server --models-preset
# Each section name is the model alias used in API request body { "model": "<alias>" }.
#
# Chat sections point at /models/active-<alias>.gguf symlinks; the API's
# bundled_providers.link_active_chat re-aims the symlink at the right GGUF
# whenever the operator picks a tier or the puller finishes a chat download.
# This lets a single static models.ini serve every tier.
#
# n-gpu-layers = auto delegates the offload decision to llama.cpp: the CPU
# build no-ops it; the CUDA build offloads as many layers as fit in VRAM.

[*]
sleep-idle-seconds = 1800

# Chat: MedGemma (cpu-std / gpu-* tiers). Symlink target varies by tier:
#   cpu-std / gpu-4gb → medgemma-1.5-4b-it-Q4_K_M.gguf
#   gpu-8gb           → medgemma-1.5-4b-it-Q8_0.gguf
#   gpu-16gb / 24gb+  → medgemma-27b-it-Q4_K_M.gguf
[medgemma]
model = /models/active-medgemma.gguf
ctx-size = 8192
n-gpu-layers = auto
jinja = 1

# Vision: MedGemma-4b + mmproj, loaded ON DEMAND by the router only for image
# ingestion (services/vision.py requests model="medgemma-vision"). Always the 4b
# model regardless of chat tier, so it stays GPU-resident next to the chat model
# instead of forcing a VRAM offload. Symlinks are aimed by bundled_providers
# (link_active_vision_base / link_active_mmproj); absent until the vision model
# is pulled, in which case the preset is simply never requested.
[medgemma-vision]
model = /models/vision/active-medgemma-4b.gguf
mmproj = /models/vision/active-mmproj.gguf
ctx-size = 8192
n-gpu-layers = auto
jinja = 1

# Tasks: Gemma 3 270M-IT (title generation, lightweight)
[gemma-tasks]
model = /models/gemma-3-270m-it-UD-Q8_K_XL.gguf
ctx-size = 512
n-gpu-layers = auto
jinja = 1

# Embed: bge-m3 Q8_0 (1024-dim dense retrieval)
[bge-m3]
model = /models/bge-m3-Q8_0.gguf
ctx-size = 8192
n-gpu-layers = auto
embedding = 1
pooling = mean

# Rerank: bge-reranker-v2-m3 Q8_0
[bge-reranker]
model = /models/bge-reranker-v2-m3-Q8_0.gguf
ctx-size = 4096
n-gpu-layers = auto
embedding = 1
pooling = rank

# Chat: Qwen (cpu-min tier only — smaller model for <16GB RAM hosts).
# Symlink target: Qwen3.5-0.8B-Q8_0.gguf
[qwen-chat]
model = /models/active-qwen.gguf
ctx-size = 4096
n-gpu-layers = auto
jinja = 1
