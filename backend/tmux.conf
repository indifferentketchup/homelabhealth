set-option -g aggressive-resize on
set-window-option -g window-size largest
set-option -g history-limit 10000

# Mobile-friendly scrolling: with mouse mode on, touch-drag inside a pane
# becomes a tmux mouse-drag, which auto-enters copy-mode and scrolls the
# pane history. This is the only way to scroll back in alternate-screen
# TUIs (claude, opencode) because xterm.js has no scrollback buffer for
# them — TUI content lives in tmux's pane buffer, not xterm's.
set-option -g mouse on
