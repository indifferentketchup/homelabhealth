# Attach UIs to hlh_default and proxy /api to hlh_api:8000 (after docker-compose.core.yml is up).
# docker compose -f docker-compose.ui.yml -f docker-compose.ui.join.yml up -d
name: homelabhealth

services:
  hlh_ui:
    networks:
      - hlh_default
    environment:
      BOOLAB_API_UPSTREAM: hlh_api:8000

networks:
  hlh_default:
    external: true
