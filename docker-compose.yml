services:
  boolab_db:
    image: postgres:16-alpine
    container_name: boolab_db
    environment:
      POSTGRES_USER: boolab
      POSTGRES_PASSWORD: boolab
      POSTGRES_DB: boolab
    volumes:
      - boolab_db_data:/var/lib/postgresql/data
    networks:
      - boolab_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boolab -d boolab']
      interval: 5s
      timeout: 5s
      retries: 5

  boolab_chroma:
    image: chromadb/chroma:latest
    container_name: boolab_chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: '8000'
    volumes:
      - boolab_chroma_data:/chroma/chroma
    networks:
      - boolab_net

  boolab_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boolab_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boolab:boolab@boolab_db:5432/boolab}
    depends_on:
      boolab_db:
        condition: service_healthy
    ports:
      - '9300:8000'
    volumes:
      - boolab_uploads:/data/uploads
      - boolab_branding:/data/branding
    networks:
      - boolab_net

  boolab_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boolab_ui
    depends_on:
      - boolab_api
    ports:
      - '9301:80'
    networks:
      - boolab_net

networks:
  boolab_net:
    driver: bridge

volumes:
  boolab_db_data:
  boolab_chroma_data:
  boolab_uploads:
  boolab_branding:
