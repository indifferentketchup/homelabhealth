# All-in-one convenience (same Docker network). For split deploy: docker-compose.core.yml + docker-compose.ui.yml
name: homelabhealth

x-hlh-chat-base: &hlh-chat-base
  container_name: hlh_chat
  restart: unless-stopped
  env_file:
    - .env
  environment:
    LD_LIBRARY_PATH: /app
  volumes:
    - hlh_models:/models:ro
    - ./hlh_chat/models.ini:/config/models.ini:ro
  command:
    - --models-preset
    - /config/models.ini
    - --host
    - "0.0.0.0"
    - --port
    - "${HLH_CHAT_PORT:-9610}"
    - --models-max
    - "${HLH_MODELS_MAX:-2}"
  user: "1000:1000"
  read_only: true
  tmpfs:
    - /tmp
    - /tmp/llama-slots
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  mem_limit: ${HLH_CHAT_MEM:-7g}
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:${HLH_CHAT_PORT:-9610}/v1/models || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 60s
  depends_on:
    - hlh_api
  networks:
    - hlh_inference

services:
  hlh_db:
    image: pgvector/pgvector:pg16
    container_name: hlh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hlh
      POSTGRES_PASSWORD: hlh
      POSTGRES_DB: hlh
    volumes:
      - hlh_db_data:/var/lib/postgresql/data
    # Hardening: read_only + cap_drop + no-new-privileges.
    # user: intentionally omitted — the postgres image expects to run as the
    # `postgres` user (uid 999); forcing "1000:1000" breaks initdb. All other
    # services carry the user: line.
    # cap_add: postgres's entrypoint runs as root initially to chown the data
    # dir, then drops to the postgres user via gosu. cap_drop:ALL removes
    # CHOWN/FOWNER/DAC_OVERRIDE/SETUID/SETGID, breaking that flow. We add
    # back the minimum set needed for the entrypoint + gosu transition.
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql    # postgres writes its Unix socket here at runtime
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hlh -d hlh']
      interval: 5s
      timeout: 5s
      retries: 5

  hlh_api:
    image: ${HLH_REGISTRY:-ghcr.io/indifferentketchup}/hlh_api:${HLH_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hlh_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hlh:hlh@hlh_db:5432/hlh}
      SEARXNG_URL: "http://hlh_search:8080"
      ORCHESTRA_TOKEN: ${ORCHESTRA_TOKEN:-}
      HLH_VERSION: ${HLH_VERSION:-latest}   # surfaced in the startup banner
    depends_on:
      hlh_db:
        condition: service_healthy
    ports:
      - "${HLH_PORT_API:-9600}:8000"
    volumes:
      - hlh_keys:/data/keys              # key_manager writes /data/keys/.hlh_keys here
      - hlh_uploads:/data/uploads
      - hlh_branding:/data/branding
      - hlh_history:/data/history
      - hlh_models:/models               # Phase 1: model_puller writes here
      - ./.env:/data/.env                # write_tier_env updates image tags on tier change
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default
      - hlh_inference

  # Phase 1: bundled chat inference (llama.cpp server). Reads model weights
  # from the shared hlh_models volume; the model file is downloaded by the
  # api (services/model_puller.py) before this service is useful — until
  # then the healthcheck fails and the container restarts.
  #
  # Only reachable inside hlh_inference. The api proxies to it as a registered
  # provider at http://hlh_chat:${HLH_CHAT_PORT}.
  #
  hlh_chat_cpu:
    <<: *hlh-chat-base
    image: ${HLH_CHAT_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-b9603}
    profiles: [bundled]

  hlh_chat_gpu:
    <<: *hlh-chat-base
    image: ${HLH_CHAT_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda-b9603}
    profiles: [bundled-gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # The hlh_orchestra image is a one-shot bootstrap tool, NOT a compose service:
  # it's run via the install.sh `docker run -e HLH_BOOTSTRAP=1 …` one-liner to
  # bring this whole stack up from nothing. Build it with:
  #   docker build -t ghcr.io/indifferentketchup/hlh_orchestra:<tag> ./hlh_orchestra
  # (MedSigLIP / the hlh_vision_embed sidecar were removed in v1.2.11; MedGemma
  # vision is now served on demand by the hlh_chat router — see [medgemma-vision]
  # in hlh_chat/models.ini.)

  # Phase 2: bundled SearXNG for web search. Internal-only on hlh_default.
  # JSON format is enabled via searxng/settings.yml (default config has it off,
  # which is why the prior external-URL wiring would silently fail to parse).
  #
  # Spec: docs/superpowers/specs/2026-05-22-bundled-system-takes-everything-design.md §1 (search addendum)
  hlh_search:
    # Pinned to 2026.5.22-c57f772ad (2026-05-22). To upgrade: pull latest,
    # inspect the org.opencontainers.image.version label, bump this tag, then
    # run `docker compose up -d hlh_search` and validate.
    image: searxng/searxng:2026.5.22-c57f772ad
    container_name: hlh_search
    restart: unless-stopped
    profiles: [bundled, bundled-gpu]
    environment:
      # Internal-only secret; SearXNG requires it to be set. Not a security
      # boundary in this deployment — the service is unreachable from outside hlh_default.
      SEARXNG_SECRET_KEY: "homelabhealth-bundled-search"
      SEARXNG_BASE_URL: "http://hlh_search:8080/"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "${HLH_PORT_SEARCH:-9612}:8080"
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
      - /etc/searxng    # SearXNG writes runtime config/cache here; settings.yml is bind-mounted ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - hlh_api
    networks:
      - hlh_default

  hlh_ui:
    image: ${HLH_REGISTRY:-ghcr.io/indifferentketchup}/hlh_ui:${HLH_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OG_TITLE: "homelabhealth"
        VITE_OG_DESCRIPTION: "Self-hosted RAG chat for personal health records."
    container_name: hlh_ui
    restart: unless-stopped
    environment:
      HLH_API_UPSTREAM: ${HLH_API_UPSTREAM:-hlh_api:8000}
    ports:
      - "${HLH_PORT_UI:-9604}:80"
    # user: intentionally omitted — nginx master must run as root (uid 0) to
    # bind port 80 and transition workers to the `nginx` (uid 101) user via
    # setuid. The worker processes themselves run as uid 101 per nginx.conf.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx    # nginx writes proxy temp files + client_body here
      - /run                # nginx.pid lives here (nginx.conf: pid /run/nginx.pid)
      - /etc/nginx/conf.d   # 20-envsubst-on-templates.sh renders templates here at startup
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # bind port 80
      - SETUID              # nginx master → worker user transition
      - SETGID              # group transition for worker processes
      - CHOWN               # nginx chowns its tmpfs cache dirs to uid 101 (nginx worker user)
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default

networks:
  hlh_default:
    name: hlh_default
    driver: bridge
  hlh_inference:
    name: hlh_inference
    driver: bridge
    internal: true

volumes:
  hlh_db_data:
  hlh_keys:
  hlh_uploads:
  hlh_branding:
  hlh_history:
  hlh_models:
