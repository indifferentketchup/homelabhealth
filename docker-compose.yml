# All-in-one convenience (same Docker network). For split deploy: docker-compose.core.yml + docker-compose.ui.yml
services:
  boolab_db:
    image: pgvector/pgvector:pg16
    container_name: boolab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: boolab
      POSTGRES_PASSWORD: boolab
      POSTGRES_DB: boolab
    volumes:
      - boolab_db_data:/var/lib/postgresql/data
    networks:
      - boolab_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boolab -d boolab']
      interval: 5s
      timeout: 5s
      retries: 5

  boolab_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boolab_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boolab:boolab@boolab_db:5432/boolab}
    depends_on:
      boolab_db:
        condition: service_healthy
    ports:
      - "${BOOLAB_PORT_API:-9300}:8000"
    volumes:
      - boolab_uploads:/data/uploads
      - boolab_branding:/data/branding
      - /opt/boolab/history:/data/history
    networks:
      - boolab_net

  notes808_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_MODE: 808notes
        VITE_OG_TITLE: "808notes"
        VITE_OG_DESCRIPTION: "Open up your DAW: Digital AI Workspace."
        VITE_HTML_OG_IMAGE: https://808notes.boogaardmusic.com/api/branding/808notes/asset/og_banner
        VITE_PUBLIC_808NOTES_URL: ${VITE_PUBLIC_808NOTES_URL:-http://${BOOLAB_PUBLIC_HOST:-127.0.0.1}:9304}
    container_name: notes808_ui
    restart: unless-stopped
    environment:
      BOOLAB_API_UPSTREAM: ${BOOLAB_API_UPSTREAM:-boolab_api:8000}
    ports:
      - "${BOOLAB_PORT_808NOTES:-9304}:80"
    networks:
      - boolab_net

networks:
  boolab_net:
    name: boolab_net
    driver: bridge

volumes:
  boolab_db_data:
  boolab_uploads:
  boolab_branding:
