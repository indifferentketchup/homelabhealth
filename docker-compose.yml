# All-in-one convenience (same Docker network). For split deploy: docker-compose.core.yml + docker-compose.ui.yml
name: homelabhealth

services:
  hlh_db:
    image: pgvector/pgvector:pg16
    container_name: hlh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hlh
      POSTGRES_PASSWORD: hlh
      POSTGRES_DB: hlh
    volumes:
      - hlh_db_data:/var/lib/postgresql/data
    # Hardening: read_only + cap_drop + no-new-privileges.
    # user: intentionally omitted — the postgres image expects to run as the
    # `postgres` user (uid 999); forcing "1000:1000" breaks initdb. All other
    # services carry the user: line.
    # cap_add: postgres's entrypoint runs as root initially to chown the data
    # dir, then drops to the postgres user via gosu. cap_drop:ALL removes
    # CHOWN/FOWNER/DAC_OVERRIDE/SETUID/SETGID, breaking that flow. We add
    # back the minimum set needed for the entrypoint + gosu transition.
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql    # postgres writes its Unix socket here at runtime
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hlh -d hlh']
      interval: 5s
      timeout: 5s
      retries: 5

  hlh_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hlh_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hlh:hlh@hlh_db:5432/hlh}
      # Bundled SearXNG (hlh_search). Override SEARXNG_URL from .env so the
      # operator can't accidentally point at a broken external instance.
      SEARXNG_URL: "http://hlh_search:8080"
    depends_on:
      hlh_db:
        condition: service_healthy
    ports:
      - "${HLH_PORT_API:-9600}:8000"
    volumes:
      - hlh_uploads:/data/uploads
      - hlh_branding:/data/branding
      - hlh_history:/data/history
      - hlh_models:/models               # Phase 1: model_puller writes here
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default
      - hlh_inference

  # Phase 1: bundled chat inference (llama.cpp server). Reads model weights
  # from the shared hlh_models volume; the model file is downloaded by the
  # api (services/model_puller.py) before this service is useful — until
  # then the healthcheck fails and the container restarts.
  #
  # Only reachable inside hlh_inference. The api proxies to it as a registered
  # provider at http://hlh_chat:${HLH_CHAT_PORT}.
  #
  # Profile `bundled`: omit COMPOSE_PROFILES (or use external-only) to skip
  # the bundled sidecars entirely. Default in .env.example includes `bundled`.
  hlh_chat:
    # llama.cpp moved from ghcr.io/ggerganov/ to ghcr.io/ggml-org/ in 2025.
    # Pinned to server-b9282 (2026-05-22; b9284 is the latest GitHub release but
    # its GHCR image had not propagated at pin time — b9282 is the highest tag
    # on ghcr.io/ggml-org/llama.cpp). To upgrade: bump the tag, run
    # `docker compose pull hlh_chat && docker compose up -d hlh_chat`, then
    # validate with backend/scripts/verify_a1_5_hardening.sh.
    image: ghcr.io/ggml-org/llama.cpp:server-b9282
    container_name: hlh_chat
    restart: unless-stopped
    profiles: [bundled]
    env_file:
      - .env
    environment:
      # llama.cpp b9282+ ships its shared libs in /app but doesn't register
      # /app in ldconfig. With read_only:true we can't run ldconfig at boot,
      # so we set LD_LIBRARY_PATH so the dynamic linker finds them directly.
      LD_LIBRARY_PATH: /app
    volumes:
      - hlh_models:/models:ro
    command: >
      --model ${HLH_CHAT_MODEL_PATH:-/models/chat/cpu-min/Qwen3-1.7B-Q8_0.gguf}
      --host 0.0.0.0
      --port ${HLH_CHAT_PORT:-9610}
      --n-gpu-layers ${HLH_CHAT_NGL:-0}
      --jinja
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${HLH_CHAT_MEM:-6g}   # cpu-min: 3g, cpu-std: 6g, gpu-8gb: 8g, gpu-16gb: 18g, gpu-24gb+: 22g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${HLH_CHAT_PORT:-9610}/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - hlh_api
    networks:
      - hlh_inference

  # Phase 2: bundled embed + rerank (infinity-emb). Serves /v1/embeddings
  # (bge-m3, 1024-dim) AND /v1/rerank (bge-reranker-v2-m3) from one process.
  # INFINITY_URL_PREFIX="/v1" aligns infinity's native /embeddings + /rerank
  # paths with the /v1/* paths used by call sites in embeddings.py, providers.py,
  # and settings.py (which also serve TEI / OpenAI-compatible external providers).
  # Internal-only on hlh_inference. First boot downloads ~1-2 GB from HF (~5-15 min).
  # Joins hlh_default as well so HF egress works on first boot (see spec §1 network note).
  #
  # Spec: docs/superpowers/specs/2026-05-22-bundled-system-takes-everything-design.md §1
  hlh_infer:
    # michaelf34/infinity — CPU variant; confirmed tag 0.0.77-cpu (2025-08-22).
    # Multi-model via INFINITY_MODEL_ID with ";" separator (infinity env.py convention).
    # Default engine for -cpu image is `optimum` (ONNX); works without NVIDIA drivers.
    image: michaelf34/infinity:0.0.77-cpu
    container_name: hlh_infer
    restart: unless-stopped
    profiles: [bundled]
    env_file:
      - .env
    environment:
      INFINITY_MODEL_ID: "BAAI/bge-m3;BAAI/bge-reranker-v2-m3"
      # bge-m3 has ONNX exports → optimum. bge-reranker-v2-m3 does NOT ship
      # ONNX files, so its slot must use torch (PyTorch CPU, no ONNX needed).
      # Semicolon-separated list is broadcast 1-to-1 with INFINITY_MODEL_ID order.
      INFINITY_ENGINE: "optimum;torch"
      INFINITY_PORT: "${HLH_INFER_PORT:-9611}"
      INFINITY_HOST: "0.0.0.0"
      INFINITY_URL_PREFIX: "/v1"   # serve at /v1/embeddings + /v1/rerank to match call-site paths
      HF_TOKEN: "${HF_TOKEN:-}"   # not required for bge models (not gated); plumbed for future
    volumes:
      - hlh_models:/app/.cache   # infinity caches downloaded weights under HF_HOME (/app/.cache)
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${HLH_INFER_PORT:-9611}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15m   # bge-m3 + reranker first download ~5-15 min from HF
    depends_on:
      - hlh_api
    networks:
      - hlh_default
      - hlh_inference

  # Phase 2: bundled SearXNG for web search. Internal-only on hlh_default.
  # JSON format is enabled via searxng/settings.yml (default config has it off,
  # which is why the prior external-URL wiring would silently fail to parse).
  #
  # Spec: docs/superpowers/specs/2026-05-22-bundled-system-takes-everything-design.md §1 (search addendum)
  hlh_search:
    # Pinned to 2026.5.22-c57f772ad (2026-05-22). To upgrade: pull latest,
    # inspect the org.opencontainers.image.version label, bump this tag, then
    # run `docker compose up -d hlh_search` and validate.
    image: searxng/searxng:2026.5.22-c57f772ad
    container_name: hlh_search
    restart: unless-stopped
    profiles: [bundled]
    environment:
      # Internal-only secret; SearXNG requires it to be set. Not a security
      # boundary in this deployment — the service is unreachable from outside hlh_default.
      SEARXNG_SECRET_KEY: "homelabhealth-bundled-search"
      SEARXNG_BASE_URL: "http://hlh_search:8080/"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "${HLH_PORT_SEARCH:-9612}:8080"
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
      - /etc/searxng    # SearXNG writes runtime config/cache here; settings.yml is bind-mounted ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - hlh_api
    networks:
      - hlh_default

  hlh_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OG_TITLE: "homelabhealth"
        VITE_OG_DESCRIPTION: "Open up your DAW: Digital AI Workspace."
    container_name: hlh_ui
    restart: unless-stopped
    environment:
      HLH_API_UPSTREAM: ${HLH_API_UPSTREAM:-hlh_api:8000}
    ports:
      - "${HLH_PORT_UI:-9604}:80"
    # user: intentionally omitted — nginx master must run as root (uid 0) to
    # bind port 80 and transition workers to the `nginx` (uid 101) user via
    # setuid. The worker processes themselves run as uid 101 per nginx.conf.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx    # nginx writes proxy temp files + client_body here
      - /run                # nginx.pid lives here (nginx.conf: pid /run/nginx.pid)
      - /etc/nginx/conf.d   # 20-envsubst-on-templates.sh renders templates here at startup
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # bind port 80
      - SETUID              # nginx master → worker user transition
      - SETGID              # group transition for worker processes
      - CHOWN               # nginx chowns its tmpfs cache dirs to uid 101 (nginx worker user)
    security_opt:
      - no-new-privileges:true
    networks:
      - hlh_default

networks:
  hlh_default:
    name: hlh_default
    driver: bridge
  hlh_inference:
    name: hlh_inference
    driver: bridge
    internal: true

volumes:
  hlh_db_data:
  hlh_uploads:
  hlh_branding:
  hlh_history:
  hlh_models:
