# All-in-one convenience (same Docker network). For split deploy: docker-compose.core.yml + docker-compose.ui.yml
name: homelabhealth

services:
  hlh_db:
    image: pgvector/pgvector:pg16
    container_name: hlh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hlh
      POSTGRES_PASSWORD: hlh
      POSTGRES_DB: hlh
    volumes:
      - hlh_db_data:/var/lib/postgresql/data
    networks:
      - hlh_default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hlh -d hlh']
      interval: 5s
      timeout: 5s
      retries: 5

  hlh_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hlh_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hlh:hlh@hlh_db:5432/hlh}
    depends_on:
      hlh_db:
        condition: service_healthy
    ports:
      - "${HLH_PORT_API:-9600}:8000"
    volumes:
      - hlh_uploads:/data/uploads
      - hlh_branding:/data/branding
      - hlh_history:/data/history
      - hlh_models:/models               # Phase 1: model_puller writes here
    networks:
      - hlh_default

  # Phase 1: bundled chat inference (llama.cpp server). Reads model weights
  # from the shared hlh_models volume; the model file is downloaded by the
  # api (services/model_puller.py) before this service is useful — until
  # then the healthcheck fails and the container restarts.
  #
  # Only reachable inside hlh_default. The api proxies to it as a registered
  # provider at http://hlh_chat:${HLH_CHAT_PORT}.
  #
  # Profile `bundled`: omit COMPOSE_PROFILES (or use external-only) to skip
  # the bundled sidecars entirely. Default in .env.example includes `bundled`.
  hlh_chat:
    # llama.cpp moved from ghcr.io/ggerganov/ to ghcr.io/ggml-org/ in 2025.
    # Unpinned `server` tag for Phase 1; pin to a specific build (e.g.
    # `server-bNNNN`) once the model file format / API contract is stable
    # for this stack — see future tidy.
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: hlh_chat
    restart: unless-stopped
    profiles: [bundled]
    env_file:
      - .env
    volumes:
      - hlh_models:/models:ro
    command: >
      --model ${HLH_CHAT_MODEL_PATH:-/models/chat/cpu-min/Qwen3-1.7B-Q8_0.gguf}
      --host 0.0.0.0
      --port ${HLH_CHAT_PORT:-9610}
      --n-gpu-layers ${HLH_CHAT_NGL:-0}
      --jinja
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${HLH_CHAT_PORT:-9610}/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - hlh_api
    networks:
      - hlh_default

  # Phase 2: bundled embed + rerank (infinity-emb). Serves /v1/embeddings
  # (bge-m3, 1024-dim) AND /rerank (bge-reranker-v2-m3) from one process.
  # Internal-only on hlh_default. First boot downloads ~1-2 GB from HF (~5-15 min).
  #
  # Spec: docs/superpowers/specs/2026-05-22-bundled-system-takes-everything-design.md §1
  hlh_infer:
    # michaelf34/infinity — CPU variant; confirmed tag 0.0.77-cpu (2025-08-22).
    # Multi-model via INFINITY_MODEL_ID with ";" separator (infinity env.py convention).
    # Default engine for -cpu image is `optimum` (ONNX); works without NVIDIA drivers.
    image: michaelf34/infinity:0.0.77-cpu
    container_name: hlh_infer
    restart: unless-stopped
    profiles: [bundled]
    env_file:
      - .env
    environment:
      INFINITY_MODEL_ID: "BAAI/bge-m3;BAAI/bge-reranker-v2-m3"
      INFINITY_PORT: "${HLH_INFER_PORT:-9611}"
      INFINITY_HOST: "0.0.0.0"
      HF_TOKEN: "${HF_TOKEN:-}"   # not required for bge models (not gated); plumbed for future
    volumes:
      - hlh_models:/app/.cache   # infinity caches downloaded weights under HF_HOME (/app/.cache)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${HLH_INFER_PORT:-9611}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15m   # bge-m3 + reranker first download ~5-15 min from HF
    depends_on:
      - hlh_api
    networks:
      - hlh_default

  hlh_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OG_TITLE: "homelabhealth"
        VITE_OG_DESCRIPTION: "Open up your DAW: Digital AI Workspace."
    container_name: hlh_ui
    restart: unless-stopped
    environment:
      HLH_API_UPSTREAM: ${HLH_API_UPSTREAM:-hlh_api:8000}
    ports:
      - "${HLH_PORT_UI:-9604}:80"
    networks:
      - hlh_default

networks:
  hlh_default:
    name: hlh_default
    driver: bridge

volumes:
  hlh_db_data:
  hlh_uploads:
  hlh_branding:
  hlh_history:
  hlh_models:
