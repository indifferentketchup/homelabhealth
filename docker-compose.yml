# All-in-one convenience (same Docker network). For split deploy: docker-compose.core.yml + docker-compose.ui.yml
name: homelabhealth

services:
  hlh_db:
    image: pgvector/pgvector:pg16
    container_name: hlh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hlh
      POSTGRES_PASSWORD: hlh
      POSTGRES_DB: hlh
    volumes:
      - hlh_db_data:/var/lib/postgresql/data
    networks:
      - hlh_default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hlh -d hlh']
      interval: 5s
      timeout: 5s
      retries: 5

  hlh_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hlh_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hlh:hlh@hlh_db:5432/hlh}
    depends_on:
      hlh_db:
        condition: service_healthy
    ports:
      - "${HLH_PORT_API:-9300}:8000"
    volumes:
      - hlh_uploads:/data/uploads
      - hlh_branding:/data/branding
      - hlh_history:/data/history
    networks:
      - hlh_default

  hlh_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OG_TITLE: "homelabhealth"
        VITE_OG_DESCRIPTION: "Open up your DAW: Digital AI Workspace."
    container_name: hlh_ui
    restart: unless-stopped
    environment:
      HLH_API_UPSTREAM: ${HLH_API_UPSTREAM:-hlh_api:8000}
    ports:
      - "${HLH_PORT_UI:-9304}:80"
    networks:
      - hlh_default

networks:
  hlh_default:
    name: hlh_default
    driver: bridge

volumes:
  hlh_db_data:
  hlh_uploads:
  hlh_branding:
  hlh_history:
