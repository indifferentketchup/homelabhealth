# Frontend only — all traffic to one boolab API (Postgres + Chroma stay with that API).
# Prerequisite: API reachable at BOOLAB_API_UPSTREAM (host:port, no http:// prefix).
#
# Examples:
#   Set BOOLAB_PUBLIC_HOST in `.env` (Tailscale/LAN IP) — Vite build URLs and default API upstream use it.
#   API elsewhere: BOOLAB_API_UPSTREAM=100.101.41.16:9300  (overrides default host:9300)
#   UI joined to boolab_net with core stack: BOOLAB_API_UPSTREAM=boolab_api:8000  (see docker-compose override in comments)
#
# Start one app:  docker compose -f docker-compose.ui.yml up -d notes808_ui
services:
  notes808_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_MODE: 808notes
        VITE_PUBLIC_808NOTES_URL: ${VITE_PUBLIC_808NOTES_URL:-http://${BOOLAB_PUBLIC_HOST:-127.0.0.1}:9304}
    container_name: notes808_ui
    environment:
      BOOLAB_API_UPSTREAM: ${BOOLAB_API_UPSTREAM:-${BOOLAB_PUBLIC_HOST:-host.docker.internal}:9300}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - "${BOOLAB_PORT_808NOTES:-9304}:80"
