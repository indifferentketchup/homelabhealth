# Frontend only — all traffic to one API container (DB stays with the API).
# Prerequisite: API reachable at BOOLAB_API_UPSTREAM (host:port, no http:// prefix).
#
# Examples:
#   Set BOOLAB_PUBLIC_HOST in `.env` (Tailscale/LAN IP) — Vite build URLs and default API upstream use it.
#   API elsewhere: BOOLAB_API_UPSTREAM=<host>:9400  (overrides default host:9400)
#   UI joined to hlh_default with core stack: BOOLAB_API_UPSTREAM=hlh_api:8000  (see docker-compose.ui.join.yml)
#
# Start the UI:  docker compose -f docker-compose.ui.yml up -d hlh_ui
name: homelabhealth

services:
  hlh_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_808NOTES_URL: ${VITE_PUBLIC_808NOTES_URL:-http://${BOOLAB_PUBLIC_HOST:-127.0.0.1}:9402}
    container_name: hlh_ui
    environment:
      BOOLAB_API_UPSTREAM: ${BOOLAB_API_UPSTREAM:-${BOOLAB_PUBLIC_HOST:-host.docker.internal}:9400}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - "${BOOLAB_PORT_808NOTES:-9402}:80"
