# Shared data + API only. Start UIs separately with docker-compose.ui.yml (or full docker-compose.yml).
services:
  boolab_db:
    image: postgres:16-alpine
    container_name: boolab_db
    environment:
      POSTGRES_USER: boolab
      POSTGRES_PASSWORD: boolab
      POSTGRES_DB: boolab
    volumes:
      - boolab_db_data:/var/lib/postgresql/data
    networks:
      - boolab_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boolab -d boolab']
      interval: 5s
      timeout: 5s
      retries: 5

  boolab_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boolab_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boolab:boolab@boolab_db:5432/boolab}
    depends_on:
      boolab_db:
        condition: service_healthy
    ports:
      - "${BOOLAB_PORT_API:-9300}:8000"
    volumes:
      - boolab_uploads:/data/uploads
      - boolab_branding:/data/branding
      - /opt/boolab/history:/data/history
    networks:
      - boolab_net

networks:
  boolab_net:
    name: boolab_net
    driver: bridge

volumes:
  boolab_db_data:
  boolab_uploads:
  boolab_branding:
