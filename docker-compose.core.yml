# Shared data + API only. Start UIs separately with docker-compose.ui.yml (or full docker-compose.yml).
services:
  boolab_db:
    image: postgres:16-alpine
    container_name: boolab_db
    environment:
      POSTGRES_USER: boolab
      POSTGRES_PASSWORD: boolab
      POSTGRES_DB: boolab
    volumes:
      - boolab_db_data:/var/lib/postgresql/data
    networks:
      - boolab_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boolab -d boolab']
      interval: 5s
      timeout: 5s
      retries: 5

  boolab_chroma:
    image: chromadb/chroma:latest
    container_name: boolab_chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: '8000'
    volumes:
      - boolab_chroma_data:/chroma/chroma
    networks:
      - boolab_net

  boolab_agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent
    container_name: boolab_agent
    restart: unless-stopped
    volumes:
      - boolab_tmux:/shared/tmux
      - /home/samkintop/.ssh:/home/agent/.ssh:ro
    networks:
      - boolab_net

  boolab_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boolab_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boolab:boolab@boolab_db:5432/boolab}
      CHROMA_HOST: boolab_chroma
      CHROMA_PORT: '8000'
    depends_on:
      boolab_db:
        condition: service_healthy
      boolab_chroma:
        condition: service_started
      boolab_agent:
        condition: service_started
    ports:
      - "${BOOLAB_PORT_API:-9300}:8000"
    volumes:
      - boolab_uploads:/data/uploads
      - boolab_branding:/data/branding
      - boolab_tmux:/shared/tmux
    networks:
      - boolab_net

networks:
  boolab_net:
    name: boolab_net
    driver: bridge

volumes:
  boolab_db_data:
  boolab_chroma_data:
  boolab_uploads:
  boolab_branding:
  boolab_tmux:
