# Shared data + API only. Start UIs separately with docker-compose.ui.yml (or full docker-compose.yml).
name: homelabhealth

services:
  hlh_db:
    image: pgvector/pgvector:pg16
    container_name: hlh_db
    environment:
      POSTGRES_USER: boolab
      POSTGRES_PASSWORD: boolab
      POSTGRES_DB: boolab
    volumes:
      - hlh_db_data:/var/lib/postgresql/data
    networks:
      - hlh_default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boolab -d boolab']
      interval: 5s
      timeout: 5s
      retries: 5

  hlh_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hlh_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boolab:boolab@hlh_db:5432/boolab}
    depends_on:
      hlh_db:
        condition: service_healthy
    ports:
      - "${BOOLAB_PORT_API:-9400}:8000"
    volumes:
      - hlh_uploads:/data/uploads
      - hlh_branding:/data/branding
      - hlh_history:/data/history
    networks:
      - hlh_default

networks:
  hlh_default:
    name: hlh_default
    driver: bridge

volumes:
  hlh_db_data:
  hlh_uploads:
  hlh_branding:
  hlh_history:
